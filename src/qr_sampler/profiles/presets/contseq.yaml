id: contseq
name: "Contseq thought engine"
description: |
  Entropy profile for the contseq "thought engine" roller
  (``qr_sampler.contseq.ContseqRoller``), not a GPU sampling lane.

  The consumer makes TWO full-size entropy fetches per engine tick —
  one for the word roll, one for the action roll — each reduced to a
  byte code in [0, 255] via the amplifier. That is exactly the entropy
  half of one token-sampling step, so the thought rolls and the token
  samples share the same statistical machinery.

  Pins the quantum gRPC source and the z-score mean amplifier so the
  lineage is explicit in ``config_hash`` logs.

experimental: false
origin: null
overrides:
  entropy_source_type: quantum_grpc
  signal_amplifier_type: zscore_mean
