id: qthought
name: "Qthought decode lane"
description: |
  Entropy profile for the qthought roller
  (``qr_sampler.qthought.QthoughtRoller``), not a GPU sampling lane.

  The case-frame grammar makes one full-size entropy fetch per decision
  (schema pick, slot-presence coin, lexicon choice, integer bind), each
  reduced to a uniform via the amplifier — exactly the entropy half of one
  token-sampling step, so the grammar decisions and the token samples share
  the same statistical machinery.

  Pins the quantum gRPC source and the optional thought-level amplifier
  (``zscore_thought``) so a per-thought aggregate bias rides alongside the
  unchanged per-decision draws. The lineage is explicit in ``config_hash``.

  The z-score baseline is calibrated against the device at build time
  (200 blocks, cached per source instance): a real QRNG's static byte-mean
  offset would otherwise saturate every u into the CDF clamp and pin every
  grammar decision to the same lexicon index (the "acorn" bug). Only
  departures from the device's own baseline register as signal.

experimental: false
origin: null
overrides:
  entropy_source_type: quantum_grpc
  signal_amplifier_type: zscore_thought
  # Pin 10000 so each qthought decision is fixed regardless of the prod
  # QR_SAMPLE_COUNT that the serving container's Secret happens to mount.
  sample_count: 10000
  zscore_calibration_samples: 200
