id: qthought_voice
name: "Qthought SPEAK lane"
description: |
  Per-request sampling lane for the qthought SPEAK step — the user-visible
  spoken turn produced only when a proposed utterance is disposed to speech.

  EDT (entropy-dependent temperature) with nucleus + top-k truncation for
  fluent, focused speech — cooler and tighter than the REFLECT lane so the
  voice reads as composed rather than divergent. Full-size fetch (10000 bytes)
  on the quantum source with plain ``zscore_mean``.

experimental: false
origin: null
overrides:
  # Server-integrated 100 KiB draws per token under the coherence gate, with the
  # composed edt strategy (cooler than REFLECT) as the gate's inner strategy.
  # sample_count / zscore_calibration_samples are degrade-fallback only.
  temperature_strategy: coherence_gate
  coherence_inner_strategy: edt
  edt_base_temp: 0.8
  # Deliberately UNtruncated: free text, all the quantum weirdness. See presets.py.
  top_k: 0
  top_p: 1.0
  coherence_threshold: 3.5
  coherence_t_boost_max: 0.5
  coherence_ema_alpha: 0.3
  entropy_source_type: quantum_grpc
  signal_amplifier_type: server
  draw_block_bytes: 102400
  sample_count: 10000
  zscore_calibration_samples: 200
