id: qthought_think
name: "Qthought REFLECT lane"
description: |
  Per-request sampling lane for the qthought REFLECT step — the private
  inner-voice line plus the propose-speech tool call.

  Derived from the ``creative_sampling`` HVH-Drift family: only the base
  temperature is lifted here (to 1.45) for more divergent reflection; the
  remaining ``hvh_*`` terms inherit the V6_HVD_R01_01 winning field defaults.
  A smaller per-request fetch (6000 bytes) trims latency for the reflection
  pass. Plain ``zscore_mean`` — the thought-level aggregate bias lives on the
  qthought decode lane, not the model sampling lane.

experimental: false
origin: "Derived from creative_sampling (V6_HVD_R01_01) with a hotter base temperature"
overrides:
  # Server-integrated 1 MiB draws per token under the coherence gate, with the
  # divergent hvh_drift family as the gate's inner strategy. sample_count /
  # zscore_calibration_samples are degrade-fallback only.
  temperature_strategy: coherence_gate
  coherence_inner_strategy: hvh_drift
  hvh_t_base: 1.45
  top_k: 0
  top_p: 1.0
  coherence_threshold: 3.5
  coherence_t_boost_max: 0.5
  coherence_ema_alpha: 0.3
  entropy_source_type: quantum_grpc
  signal_amplifier_type: server
  draw_block_bytes: 1048576
  sample_count: 6000
  zscore_calibration_samples: 200
