repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # Pinned to the ruff version installed by the dev extra so hook results and
  # `scripts/check.py --only lint,format` results cannot drift apart.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/, -q]
        pass_filenames: false

  # mypy runs from the dev environment (not an isolated hook env) so it sees
  # the real installed dependency set — the same invocation as CI.
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict src/ (via scripts/check.py)
        entry: python scripts/check.py --only types
        language: system
        types: [python]
        pass_filenames: false
